name: Tweet Daily Report

on:
  push:
    branches: [main]
    paths:
      - 'reports/**.html'

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get new report info
        id: info
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'reports/*.html' | head -1)
          if [ -z "$FILE" ]; then
            echo "No new report found, skipping."
            echo "file=" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "file=$FILE" >> $GITHUB_OUTPUT
          DATE=$(echo "$FILE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "url=https://hatorihb.github.io/Daily-News/$FILE" >> $GITHUB_OUTPUT

      - name: Install dependencies
        if: steps.info.outputs.file != ''
        run: pip install tweepy beautifulsoup4 --quiet

      - name: Build tweet and post to X
        if: steps.info.outputs.file != ''
        run: |
          python3 - <<'PYEOF'
import tweepy, os, sys, re
from bs4 import BeautifulSoup

html_file = os.environ['REPORT_FILE']
date_str  = os.environ['REPORT_DATE']
url       = os.environ['REPORT_URL']

with open(html_file, encoding='utf-8') as f:
    soup = BeautifulSoup(f.read(), 'html.parser')

# ─── タイトル短縮 ───────────────────────────────────────────────
def shorten(title, max_len=24):
    """重要情報が先頭に残るよう意味的に短縮する"""
    # "—" "——" 以降を除去（説明部分が多い）
    for sep in [' — ', '—', ' - ']:
        if sep in title:
            cand = title.split(sep)[0].strip()
            if len(cand) >= 10:
                title = cand
                break
    # 数字・バージョン・モデル名を含む先頭部分を優先
    if len(title) <= max_len:
        return title
    # 読点・括弧の前で自然に切れる位置を探す
    for i in range(max_len, max(max_len - 6, 8), -1):
        if title[i] in '、。（】 ':
            return title[:i] + '…'
    return title[:max_len] + '…'

# ─── セクションごとに上位カードを抽出 ────────────────────────────
def extract_items(section_id, limit=2):
    section = soup.find('section', id=section_id)
    if not section:
        return []
    cards = section.find_all('div', class_='card')

    def priority(card):
        if card.find(class_='impact-high'):   return 0
        if card.find(class_='impact-medium'): return 1
        return 2

    results = []
    for card in sorted(cards, key=priority)[:limit]:
        a = card.find(class_='card-title')
        if a:
            a = a.find('a')
        if a:
            results.append(shorten(a.get_text(strip=True)))
    return results

ai_items       = extract_items('ai',       2)
aws_items      = extract_items('aws',      2)
domestic_items = extract_items('domestic', 2)

# ─── ツイート本文を組み立て ────────────────────────────────────
mm_dd = date_str[5:].replace('-', '/')   # "05/04"

lines = [
    f"🔥 DX・AI・AWS｜{mm_dd}",
    "",
    "今日の見逃せないアップデート👇",
    "",
]

if ai_items:
    for item in ai_items:
        lines.append(f"🤖 {item}")

if aws_items:
    if ai_items:
        lines.append("")
    for item in aws_items:
        lines.append(f"☁️ {item}")

if domestic_items:
    lines.append("")
    for item in domestic_items:
        lines.append(f"🇯🇵 {item}")

lines += [
    "",
    "詳細レポートはこちら👇",
    url,
    "",
    "#AI #AWS #生成AI #LLM #DX",
]

tweet = "\n".join(lines)
# X は URL を 23 文字として計算するため実表示文字数は少ない
actual_len = len(re.sub(r'https?://\S+', 'x' * 23, tweet))
print(f"--- Tweet ({actual_len} weighted chars) ---\n{tweet}\n---")

# ─── 投稿 ────────────────────────────────────────────────────
client = tweepy.Client(
    consumer_key=os.environ['X_API_KEY'],
    consumer_secret=os.environ['X_API_SECRET'],
    access_token=os.environ['X_ACCESS_TOKEN'],
    access_token_secret=os.environ['X_ACCESS_TOKEN_SECRET'],
)
response = client.create_tweet(text=tweet)
print(f"✅ Tweet posted! ID: {response.data['id']}")
PYEOF
        env:
          X_API_KEY:              ${{ secrets.X_API_KEY }}
          X_API_SECRET:           ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:         ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:  ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          REPORT_FILE:            ${{ steps.info.outputs.file }}
          REPORT_DATE:            ${{ steps.info.outputs.date }}
          REPORT_URL:             ${{ steps.info.outputs.url }}
