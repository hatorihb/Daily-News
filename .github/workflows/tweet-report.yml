name: Post Daily Report to Threads

on:
  push:
    branches: [main]
    paths:
      - 'reports/**.html'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get new report info
        id: info
        run: |
          FILE=$(git diff --name-only HEAD~1 HEAD -- 'reports/*.html' | head -1)
          if [ -z "$FILE" ]; then
            echo "No new report found, skipping."
            exit 0
          fi
          echo "file=$FILE" >> $GITHUB_OUTPUT
          DATE=$(echo "$FILE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "url=https://hatorihb.github.io/Daily-News/$FILE" >> $GITHUB_OUTPUT

      - name: Post to Threads
        if: steps.info.outputs.file != ''
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          REPORT_DATE: ${{ steps.info.outputs.date }}
          REPORT_URL: ${{ steps.info.outputs.url }}
        run: |
          TEXT="【AI・AWS Daily Report ${REPORT_DATE}】

過去24時間のAI・AWSアップデートをまとめました。

${REPORT_URL}

#AI #AWS #生成AI #LLM"

          # Step 1: メディアコンテナを作成
          CONTAINER=$(curl -s -X POST \
            "https://graph.threads.net/v1.0/${THREADS_USER_ID}/threads" \
            --data-urlencode "text=${TEXT}" \
            -d "media_type=TEXT" \
            -d "access_token=${THREADS_ACCESS_TOKEN}")

          echo "Container response: $CONTAINER"
          CONTAINER_ID=$(echo "$CONTAINER" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")

          # Step 2: 投稿を公開
          RESULT=$(curl -s -X POST \
            "https://graph.threads.net/v1.0/${THREADS_USER_ID}/threads_publish" \
            -d "creation_id=${CONTAINER_ID}" \
            -d "access_token=${THREADS_ACCESS_TOKEN}")

          echo "Publish response: $RESULT"
          echo "Post published successfully!"
