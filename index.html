<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hatorih's Daily Tech Report | 国内IT・DX &amp; AI &amp; AWSアップデート</title>
<style>
:root{
  --black:#0a0a0a;
  --white:#ffffff;
  --red:#E60012;
  --gray:#f2f2f2;
  --mid:#888;
  --border:#e0e0e0;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Helvetica Neue','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
  background:var(--white);
  color:var(--black);
  font-size:16px;
  line-height:1.6;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}
a{color:inherit;text-decoration:none}
header{background:var(--black);color:var(--white);padding:4rem 0 3.5rem}
.container{max-width:960px;margin:0 auto;padding:0 2rem}
.header-label{font-size:.7rem;font-weight:700;letter-spacing:.25em;color:var(--red);text-transform:uppercase;margin-bottom:1.25rem}
h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:900;line-height:1.05;letter-spacing:-.02em;margin-bottom:1rem}
.header-sub{font-size:.85rem;color:#888;letter-spacing:.05em}
.header-date{font-size:2.5rem;font-weight:900;color:var(--white);letter-spacing:-.02em;margin-top:.75rem;line-height:1}
main{flex:1;padding:3rem 0}
.section-label{font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);margin-bottom:2rem;padding-bottom:.75rem;border-bottom:2px solid var(--black)}
.report-list{list-style:none}
.report-item{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:1.5rem;
  padding:1.5rem 0;
  border-bottom:1px solid var(--border);
  transition:background .15s;
}
.report-item:first-child{border-top:1px solid var(--border)}
.report-item:hover{background:var(--gray);margin:0 -2rem;padding:1.5rem 2rem}
.report-num{font-size:2rem;font-weight:900;color:var(--border);letter-spacing:-.04em;min-width:3rem;text-align:right;line-height:1}
.report-info{min-width:0}
.report-date{font-size:1.1rem;font-weight:800;letter-spacing:-.01em;margin-bottom:.2rem}
.report-date-sub{font-size:.72rem;color:var(--mid);letter-spacing:.1em;text-transform:uppercase}
.report-btn{
  font-size:.72rem;
  font-weight:700;
  letter-spacing:.1em;
  text-transform:uppercase;
  border:2px solid var(--black);
  padding:.5rem 1.2rem;
  white-space:nowrap;
  transition:background .15s,color .15s;
}
.report-btn:hover{background:var(--black);color:var(--white)}
.report-item.latest .report-num{color:#ffe0e0}
.report-item.latest .report-date{color:var(--red)}
.report-item.latest .report-btn{border-color:var(--red);color:var(--red)}
.report-item.latest .report-btn:hover{background:var(--red);color:var(--white)}
.loading,.empty,.error{
  padding:3rem 0;
  color:var(--mid);
  font-size:.9rem;
  letter-spacing:.05em;
}
details.month-accordion{border-bottom:1px solid var(--border)}
details.month-accordion > summary{
  list-style:none;
  display:flex;
  align-items:center;
  gap:.75rem;
  cursor:pointer;
  padding:1.1rem 0;
  font-size:.75rem;
  font-weight:700;
  letter-spacing:.2em;
  text-transform:uppercase;
  color:var(--mid);
  transition:color .15s;
  user-select:none;
}
details.month-accordion > summary::-webkit-details-marker{display:none}
details.month-accordion > summary::before{
  content:'';
  display:inline-block;
  width:.45rem;
  height:.45rem;
  border-right:2px solid currentColor;
  border-bottom:2px solid currentColor;
  transform:rotate(-45deg);
  transition:transform .2s;
  flex-shrink:0;
}
details.month-accordion[open] > summary::before{transform:rotate(45deg);margin-top:-.2rem}
details.month-accordion > summary:hover{color:var(--black)}
.month-count{
  font-size:.65rem;
  font-weight:400;
  letter-spacing:.05em;
  color:var(--mid);
  text-transform:none;
}
footer{background:var(--black);color:#555;padding:2rem 0;font-size:.72rem;letter-spacing:.1em}
footer .container{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
.footer-brand{font-weight:900;font-size:.9rem;color:var(--white);letter-spacing:-.01em}
@media(max-width:640px){
  h1{font-size:2rem}
  .report-item{grid-template-columns:1fr auto;gap:1rem}
  .report-num{display:none}
  .report-item:hover{margin:0 -1rem;padding:1.5rem 1rem}
  .container{padding:0 1rem}
}
</style>
</head>
<body>

<header>
  <div class="container">
    <p class="header-label">hatorih's Daily Tech Report</p>
    <h1>国内IT・DX<br>AI &amp; AWS<br>アップデート</h1>
    <p class="header-sub">過去24時間の国内IT・DX・AI・AWSアップデートを毎朝自動収集</p>
    <p class="header-date" id="header-date"></p>
  </div>
</header>

<main>
  <div class="container">
    <p class="section-label">Reports</p>
    <div id="list">
      <p class="loading">読み込み中...</p>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <span class="footer-brand">hatorih's Daily Tech Report</span>
    <span>hatorihb/Daily-News</span>
  </div>
</footer>

<script>
const OWNER = 'hatorihb';
const REPO  = 'Daily-News';
const BASE  = `https://${OWNER}.github.io/${REPO}`;

fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/reports`)
  .then(r => {
    if (!r.ok) throw new Error(r.status);
    return r.json();
  })
  .then(files => {
    const reports = files
      .filter(f => /^tech-report-\d{4}-\d{2}-\d{2}\.html$/.test(f.name))
      .sort((a, b) => b.name.localeCompare(a.name));

    const list = document.getElementById('list');

    if (reports.length === 0) {
      list.innerHTML = '<p class="empty">レポートはまだありません。</p>';
      return;
    }

    // 最新レポートの日付をヘッダーに表示
    const latestDate = (reports[0].name.match(/(\d{4}-(\d{2})-(\d{2}))/) || []);
    if (latestDate[2] && latestDate[3]) {
      const m = parseInt(latestDate[2]);
      const d = parseInt(latestDate[3]);
      document.getElementById('header-date').textContent = `${m}/${d}`;
    }

    const dayNames = ['日','月','火','水','木','金','土'];
    const currentYM = reports[0].name.slice(7, 14); // YYYY-MM of latest

    // group by YYYY-MM
    const groups = new Map();
    reports.forEach((f, i) => {
      const dateStr = (f.name.match(/(\d{4}-\d{2}-\d{2})/) || [])[1];
      const ym = dateStr.slice(0, 7);
      if (!groups.has(ym)) groups.set(ym, []);
      groups.get(ym).push({ f, i, dateStr });
    });

    list.innerHTML = '';
    let globalNum = reports.length;

    groups.forEach((items, ym) => {
      const [y, m] = ym.split('-');
      const monthLabel = `${y}年${parseInt(m)}月`;
      const isCurrent = ym === currentYM;

      // build <ul> of report items
      const ul = document.createElement('ul');
      ul.className = 'report-list';
      items.forEach(({ f, i, dateStr }) => {
        const [, , d] = dateStr.split('-');
        const label = `${y}年${parseInt(m)}月${parseInt(d)}日`;
        const dow = dayNames[new Date(`${dateStr}T00:00:00+09:00`).getDay()];
        const url = `${BASE}/reports/${f.name}`;
        const num = String(globalNum--).padStart(2, '0');
        const isLatest = i === 0;
        const li = document.createElement('li');
        li.className = 'report-item' + (isLatest ? ' latest' : '');
        li.innerHTML = `
          <div class="report-num">${num}</div>
          <div class="report-info">
            <div class="report-date">${label}（${dow}）</div>
            <div class="report-date-sub">${isLatest ? 'Latest &mdash; ' : ''}${dateStr}</div>
          </div>
          <a class="report-btn" href="${url}" target="_blank" rel="noopener">読む &rarr;</a>`;
        ul.appendChild(li);
      });

      const details = document.createElement('details');
      details.className = 'month-accordion';
      if (isCurrent) details.open = true;
      const summary = document.createElement('summary');
      summary.innerHTML = `${monthLabel}<span class="month-count">　${items.length}件</span>`;
      details.appendChild(summary);
      details.appendChild(ul);
      list.appendChild(details);
    });
  })
  .catch(() => {
    document.getElementById('list').innerHTML =
      '<p class="error">レポートの取得に失敗しました。ページを再読み込みしてください。</p>';
  });
</script>

</body>
</html>
